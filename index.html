<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MM2 Values</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<audio id="clickSound" src="click.mp3"></audio>

<!-- BOTÃO MENU -->

<div id="menuBtn" class="menu-btn" onclick="toggleMenu();playClick()">
☰
</div>

<!-- MENU -->

<div id="menu" class="menu glass">

<h2>Menu</h2>

<a onclick="playClick()" href="https://sleepyofc7.github.io/meu-hub/" target="_blank">🏠 HUB</a>

<a onclick="playClick()" href="https://www.roblox.com/pt/games/142823291/Murder-Mystery-2" target="_blank">Murder Mystery</a>

<a onclick="playClick()" href="https://sleepyofc7.github.io/CONTADOR-DE-PARTIDAS-MM2/" target="_blank">Contador de Partidas</a>

</div>

<div id="overlay" onclick="toggleMenu()"></div>

<header>

<h1 class="title">MM2 VALUES</h1>

</header>

<!-- PESQUISA -->

<div class="search glass">

<input
type="text"
placeholder="🔎 Buscar item..."
id="searchInput"
oninput="searchItems()"
/>

</div>

<!-- FILTROS -->

<div class="top-bar glass">

<select id="sort">
<option value="az">A-Z</option>
<option value="value">Valor</option>
<option value="rarity">Raridade</option>
</select>

<span id="counter">0 itens</span>

</div>

<!-- CATEGORIAS -->

<div class="categories">

<button class="active" onclick="filterCategory(event,'All')">All</button>

<button onclick="filterCategory(event,'Common')">Common</button>
<button onclick="filterCategory(event,'Uncommon')">Uncommon</button>
<button onclick="filterCategory(event,'Rare')">Rare</button>
<button onclick="filterCategory(event,'Legendary')">Legendary</button>

<button onclick="filterCategory(event,'Godly')">Godly</button>
<button onclick="filterCategory(event,'Chroma')">Chroma</button>

<button onclick="filterCategory(event,'Vintage')">Vintage</button>
<button onclick="filterCategory(event,'Ancient')">Ancient</button>
<button onclick="filterCategory(event,'Evo')">Evo</button>
<button onclick="filterCategory(event,'Unique')">Unique</button>

<button onclick="filterCategory(event,'Untradable')">Untradable</button>
<button onclick="filterCategory(event,'Misc')">Misc item</button>
<button onclick="filterCategory(event,'Pet')">Pet</button>
<button onclick="filterCategory(event,'Set')">Set</button>

</div>

<!-- ITENS -->

<div id="items" class="items"></div>

<!-- POPUP ITEM -->

<div id="itemPopup" class="popup">

<div class="popup-content glass">

<span class="close" onclick="closePopup()">✖</span>

<img id="popupImg">

<h2 id="popupName"></h2>

<p id="popupValue"></p>
<p id="popupRarity"></p>
<p id="popupOrigin"></p>
<p id="popupDemand"></p>
<p id="popupStability"></p>

</div>

</div>

<script src="items.js"></script>
<script src="others.js"></script>

<script>

let allItems=[...items,...others]
let current=[...allItems]

function render(){

let container=document.getElementById("items")

container.innerHTML=""

current.forEach(item=>{

let glow=""

if(item.rarity=="Godly") glow="godly"
if(item.rarity=="Chroma") glow="chroma"

container.innerHTML+=`

<div class="item glass ${glow}" onclick='openItem(${JSON.stringify(item)})'>

<img src="images/${item.image}">

<h3>${item.name}</h3>

<p>💰 ${item.value}</p>

</div>

`

})

document.getElementById("counter").innerText=current.length+" itens"

}

function openItem(item){

playClick()

document.getElementById("itemPopup").style.display="flex"

document.getElementById("popupImg").src="images/"+item.image
document.getElementById("popupName").innerText=item.name
document.getElementById("popupValue").innerText="💰 Valor: "+item.value
document.getElementById("popupRarity").innerText="⭐ Raridade: "+item.rarity
document.getElementById("popupOrigin").innerText="🎲 Origem: "+(item.origin||"Unknown")
document.getElementById("popupDemand").innerText="📈 Demand: "+(item.demand||"?")
document.getElementById("popupStability").innerText="📊 Stability: "+(item.stability||"?")

}

function closePopup(){

document.getElementById("itemPopup").style.display="none"

}

function searchItems(){

let text=document
.getElementById("searchInput")
.value
.toLowerCase()

current=allItems.filter(item=>
item.name.toLowerCase().includes(text)
)

render()

}

function filterCategory(e,cat){

playClick()

document
.querySelectorAll(".categories button")
.forEach(btn=>btn.classList.remove("active"))

e.target.classList.add("active")

if(cat=="All"){
current=[...allItems]
}else{
current=allItems.filter(i=>i.rarity==cat)
}

render()

}

document.getElementById("sort").addEventListener("change",e=>{

playClick()

let v=e.target.value

if(v=="az") current.sort((a,b)=>a.name.localeCompare(b.name))

if(v=="value") current.sort((a,b)=>b.value-a.value)

if(v=="rarity") current.sort((a,b)=>a.rarity.localeCompare(b.rarity))

render()

})

function toggleMenu(){

let menu=document.getElementById("menu")
let overlay=document.getElementById("overlay")
let btn=document.getElementById("menuBtn")

menu.classList.toggle("open")
overlay.classList.toggle("show")

if(menu.classList.contains("open")){
btn.style.display="none"
}else{
btn.style.display="block"
}

}

function playClick(){

let audio=document.getElementById("clickSound")
audio.currentTime=0
audio.play()

}

render()

</script>

</body>
</html>
