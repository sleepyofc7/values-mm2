<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM2 VALUES</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">

</head>
<body>

<audio id="clickSound" src="click.mp3"></audio>

<!-- BOTÃO MENU -->
<div class="menu-btn glass" id="menuBtn" onclick="toggleMenu(); playClick();">
    <span></span>
    <span></span>
    <span></span>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<!-- MENU LATERAL -->
<div class="sidebar glass" id="sidebar">

    <!-- 🔥 MUDE AQUI OS LINKS -->
    <!-- Troque o texto entre > e </a> -->
    <!-- Troque o link dentro do href="" -->

    <a href="https://sleepyofc7.github.io/meu-hub/" target="_blank">🏠HUB</a>
    <a href="https://roblox.com" target="_blank">Roblox</a>
    <a href="#">Atualizações</a>

    <!-- Para adicionar outro link:
    <a href="LINK_AQUI" target="_blank">NOME AQUI</a>
    -->

</div>

<header>
    <h1>MM2 VALUES</h1>
</header>

<section class="items" id="itemsContainer"></section>

<script src="items.js"></script>

<script>

let currentCategory = "all"

function playClick(){
  document.getElementById("clickSound").play()
}

function toggleMenu(){
  sidebar.classList.toggle("open")
  overlay.classList.toggle("active")
  menuBtn.classList.toggle("hidden")
}

function closeMenu(){
  sidebar.classList.remove("open")
  overlay.classList.remove("active")
  menuBtn.classList.remove("hidden")
}

// 🔥 CRIA OS ITENS AUTOMATICAMENTE
function renderItems(){

  const container = document.getElementById("itemsContainer")
  container.innerHTML = ""

  items.sort((a,b)=>b.value - a.value)

  items.forEach(item=>{

    const div = document.createElement("div")
    div.className = "item glass"

    div.innerHTML = `
      <img src="${item.image}">
      <h3>${item.name}</h3>
      <p>Valor: ${item.value}</p>
      <p>Origem: ${item.origin}</p>
      <p>Raridade: ${item.rarity}</p>
    `

    container.appendChild(div)

  })
}

renderItems()

</script>

</body>
</html>
