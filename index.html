<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MM2 Values</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<audio id="clickSound" src="click.mp3"></audio>

<!-- BOTÃO MENU -->

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

<!-- MENU LATERAL -->

<div id="menu" class="menu glass">

<h2>Menu</h2>

<a href="#">Home</a>
<a href="#">Trading</a>
<a href="#">Discord</a>
<a href="#">Outro Site</a>

</div>

<div id="overlay" onclick="toggleMenu()"></div>

<!-- TITULO -->

<header>

<h1 class="title">
MM2 VALUES
</h1>

</header>

<!-- FILTROS -->

<div class="top-bar glass">

<select id="sort">
<option value="az">A-Z</option>
<option value="value">Valor</option>
<option value="rarity">Raridade</option>
</select>

<span id="counter">0 itens</span>

</div>

<!-- CATEGORIAS -->

<div class="categories">

<button onclick="filterCategory('All')">All</button>

<button onclick="filterCategory('Common')">Common</button>
<button onclick="filterCategory('Uncommon')">Uncommon</button>
<button onclick="filterCategory('Rare')">Rare</button>
<button onclick="filterCategory('Legendary')">Legendary</button>

<button onclick="filterCategory('Godly')">Godly</button>
<button onclick="filterCategory('Chroma')">Chroma</button>

<button onclick="filterCategory('Vintage')">Vintage</button>
<button onclick="filterCategory('Ancient')">Ancient</button>
<button onclick="filterCategory('Evo')">Evo</button>
<button onclick="filterCategory('Unique')">Unique</button>

<button onclick="filterCategory('Untradable')">Untradable</button>
<button onclick="filterCategory('Misc')">Misc item</button>
<button onclick="filterCategory('Pet')">Pet</button>
<button onclick="filterCategory('Set')">Set</button>

</div>

<!-- ITENS -->

<div id="items" class="items"></div>

<script src="items.js"></script>
<script src="others.js"></script>

<script>

let allItems = [...items, ...others]
let current = [...allItems]

function render(){

let container = document.getElementById("items")

container.innerHTML = ""

current.forEach(item=>{

let glow = ""

if(item.rarity=="Godly") glow="godly"
if(item.rarity=="Chroma") glow="chroma"

container.innerHTML+=`

<div class="item glass ${glow}">

<img src="${item.folder}/${item.image}">

<h3>${item.name}</h3>

<p>${item.value}</p>

</div>

`

})

document.getElementById("counter").innerText=current.length+" itens"

}

function filterCategory(cat){

playClick()

if(cat=="All"){
current=[...allItems]
}else{
current=allItems.filter(i=>i.rarity==cat)
}

render()

}

document.getElementById("sort").addEventListener("change",e=>{

playClick()

let v=e.target.value

if(v=="az"){

current.sort((a,b)=>a.name.localeCompare(b.name))

}

if(v=="value"){

current.sort((a,b)=>b.value-a.value)

}

if(v=="rarity"){

current.sort((a,b)=>a.rarity.localeCompare(b.rarity))

}

render()

})

function toggleMenu(){

playClick()

let menu=document.getElementById("menu")
let overlay=document.getElementById("overlay")

menu.classList.toggle("open")
overlay.classList.toggle("show")

}

function playClick(){

document.getElementById("clickSound").play()

}

document.addEventListener("click",playClick)

render()

</script>

</body>
</html>
