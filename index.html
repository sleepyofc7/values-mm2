```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MM2 VALUES</title>

<link rel="stylesheet" href="style.css">

<!-- Fonte Apple -->
<link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">

</head>
<body>

<audio id="clickSound" src="click.mp3"></audio>

<!-- BOTÃO MENU -->
<div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div class="menu glass" id="menu">

<!-- EDITAR LINKS AQUI -->
<a href="https://sleepyofc7.github.io/meu-hub/" target="_blank">🏠 HUB</a>
<a href="https://roblox.com" target="_blank">Roblox</a>
<a href="#">Atualizações</a>

</div>

<header>
<h1 class="title">MM2 VALUES</h1>
</header>

<!-- PESQUISA -->
<div class="top-bar">

<div class="search">
<input type="text" id="searchInput" placeholder="Search item..." oninput="renderItems()">
</div>

<!-- CLASSIFICAÇÃO -->
<select id="sortSelect" onchange="renderItems()">
<option value="value">Valor</option>
<option value="az">A-Z</option>
<option value="rarity">Raridade</option>
</select>

</div>

<!-- CATEGORIAS -->
<div class="categories">

<button onclick="setCategory('all')">All</button>
<button onclick="setCategory('Common')">Common</button>
<button onclick="setCategory('Uncommon')">Uncommon</button>
<button onclick="setCategory('Rare')">Rare</button>
<button onclick="setCategory('Legendary')">Legendary</button>
<button onclick="setCategory('Godly')">Godly</button>
<button onclick="setCategory('Chroma')">Chroma</button>
<button onclick="setCategory('Vintage')">Vintage</button>
<button onclick="setCategory('Ancient')">Ancient</button>
<button onclick="setCategory('Evo')">Evo</button>
<button onclick="setCategory('Unique')">Unique</button>

<!-- others.js -->
<button onclick="setCategory('Untradable')">Untradable</button>
<button onclick="setCategory('Pet')">Pet</button>
<button onclick="setCategory('Set')">Set</button>
<button onclick="setCategory('Misc')">Misc</button>

</div>

<!-- CONTADOR -->
<div class="counter" id="counter"></div>

<section class="items" id="itemsContainer"></section>

<script src="items.js"></script>
<script src="others.js"></script>

<script>

let currentCategory="all"

const allItems=[...items,...others]

document.addEventListener("click",()=>{
const audio=document.getElementById("clickSound")
audio.currentTime=0
audio.play()
})

function toggleMenu(){

menu.classList.add("open")
overlay.classList.add("active")
menuBtn.classList.add("hidden")

}

function closeMenu(){

menu.classList.remove("open")
overlay.classList.remove("active")
menuBtn.classList.remove("hidden")

}

function setCategory(cat){

currentCategory=cat
renderItems()

}

function renderItems(){

const container=document.getElementById("itemsContainer")
const search=document.getElementById("searchInput").value.toLowerCase()
const sort=document.getElementById("sortSelect").value

container.innerHTML=""

let filtered=allItems.filter(item=>{

const matchCategory=currentCategory==="all" || item.rarity===currentCategory
const matchSearch=item.name.toLowerCase().includes(search)

return matchCategory && matchSearch

})

if(sort==="value") filtered.sort((a,b)=>b.value-a.value)

if(sort==="az") filtered.sort((a,b)=>a.name.localeCompare(b.name))

if(sort==="rarity") filtered.sort((a,b)=>a.rarity.localeCompare(b.rarity))

document.getElementById("counter").innerText="Itens encontrados: "+filtered.length

filtered.forEach(item=>{

const div=document.createElement("div")
div.className="item glass "+item.rarity

div.innerHTML=`

<img src="${item.folder}/${item.image}">

<h3>${item.name}</h3>

<p>Valor: ${item.value}</p>

<p>${item.rarity}</p>

`

container.appendChild(div)

})

}

renderItems()

</script>

</body>
</html>
```
